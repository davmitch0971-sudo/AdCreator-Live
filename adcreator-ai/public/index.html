<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <title>AdCreator AI | Elite Performance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .glass { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    .gradient-text { background: linear-gradient(to right, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen selection:bg-emerald-500/30">

  <!-- Navbar -->
  <nav class="max-w-6xl mx-auto px-6 py-6 flex justify-between items-center">
    <div class="text-xl font-bold tracking-tighter">AD<span class="gradient-text">CREATOR</span></div>
    <div class="flex gap-6 text-sm font-medium text-slate-400">
      <span class="px-2 py-1 bg-emerald-500/10 text-emerald-400 rounded-md border border-emerald-500/20 text-[10px] uppercase tracking-widest">Active: Elite Tier</span>
    </div>
  </nav>

  <!-- Hero -->
  <header class="max-w-3xl mx-auto px-6 py-12 text-center">
    <h1 class="text-5xl md:text-6xl font-extrabold tracking-tighter mb-4">Craft Ads That Convert.</h1>
    <p class="text-slate-400 text-lg mb-8">Professional-grade AI engine. $9.99/mo Elite Access.</p>
    <button onclick="window.location.href='/paypal/checkout'" class="group px-8 py-4 rounded-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold transition-all shadow-[0_0_20px_rgba(16,185,129,0.3)]">
      Get Elite Access
    </button>
  </header>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-6 pb-24">
    <div class="grid gap-8 md:grid-cols-12">
      
      <!-- Input Panel -->
      <section class="md:col-span-7 glass rounded-3xl p-8">
        <h2 class="text-sm uppercase tracking-widest text-slate-500 font-bold mb-6">Configuration</h2>
        <textarea
          id="prompt"
          class="w-full h-64 rounded-2xl bg-slate-950/50 border border-slate-800 px-6 py-4 focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 outline-none transition-all placeholder:text-slate-700"
          placeholder="Describe your product, audience, and platform..."
        ></textarea>
        <button id="generateBtn" class="mt-6 w-full py-4 rounded-2xl bg-slate-800 hover:bg-slate-700 border border-slate-700 font-semibold transition-all">
          Run Generation Engine
        </button>
      </section>

      <!-- Output Panel -->
      <section class="md:col-span-5 glass rounded-3xl p-8">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-sm uppercase tracking-widest text-slate-500 font-bold">Live Output</h2>
          <!-- Prestige Badge -->
          <span class="text-[9px] font-mono text-emerald-500/60 border border-emerald-500/20 px-2 py-0.5 rounded">GPT-4o-ELITE</span>
        </div>
        <div id="output" class="text-slate-300 leading-relaxed min-h-[300px]">
          Waiting for input...
        </div>
        <div id="status" class="mt-8 text-[10px] text-emerald-500/80 uppercase tracking-widest">System Ready.</div>
      </section>
    </div>
  </main>

  <script>
    const btn = document.getElementById('generateBtn');
    const promptEl = document.getElementById('prompt');
    const outputEl = document.getElementById('output');
    const statusEl = document.getElementById('status');
    const copyBtn = document.getElementById('copyBtn');

    btn.addEventListener('click', async () => {
      const prompt = promptEl.value.trim();
      if (!prompt) { statusEl.textContent = 'Awaiting Brief.'; return; }
      btn.disabled = true;
      statusEl.textContent = 'Processing via Engine...';
      try {
        const res = await fetch('/api/ads', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        const data = await res.json();
        outputEl.textContent = data?.choices?.[0]?.message?.content || 'Error.';
        statusEl.textContent = 'Generation Complete.';
      } catch (e) {
        statusEl.textContent = 'Engine Error.';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
