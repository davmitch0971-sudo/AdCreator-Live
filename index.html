<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elite Ad Intelligence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="left-column">
            <header>
                <h1>Elite Ad Intelligence</h1>
                <p>Command professional-grade campaign narrative.</p>
            </header>
            <div id="pricing-panel" class="card">
                <h2>Executive Membership - $5.99/mo</h2>
            </div>
            <section id="card-upgrade" class="card">
                <h3>The Upgrade Effect</h3>
                <div class="compare-boxes">
                    <div class="box">Generic AI Draft</div>
                    <div class="box">AdCreator Pro Narrative</div>
                </div>
            </section>
        </div>

        <div class="right-column">
            <section id="card-why" class="card">
                <h3>Why Choose AdCreator</h3>
                <p>PRECISE NARRATIVE CONTROL: Precision-engineered ad copy.</p>
            </section>
            <section id="card-results" class="card">
                <h3>Elite Marketer Results</h3>
                <div class="testimonial-row">
                    <div class="person"><p>Sarah J.</p></div>
                    <div class="person"><p>Marcus T.</p></div>
                    <div class="person"><p>Elena R.</p></div>
                </div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
